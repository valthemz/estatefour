<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Estate No. 4</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #080808; color: #e5e5e5; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .gold-text { color: #c5a059; }
        .gold-border { border-color: rgba(197, 160, 89, 0.2); }
        .glass-card { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(10px); border: 1px solid rgba(197, 160, 89, 0.1); }
        .status-badge { font-size: 10px; padding: 2px 8px; border-radius: 99px; text-transform: uppercase; font-weight: bold; }
        .status-pending { background: #f59e0b20; color: #f59e0b; }
        .status-ready { background: #10b98120; color: #10b981; }
        .step-hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- Layar Login Admin -->
    <div id="login-screen" class="fixed inset-0 z-[200] bg-black flex items-center justify-center">
        <div class="glass-card p-10 rounded-2xl w-full max-w-sm text-center space-y-6">
            <h2 class="text-3xl font-serif gold-text italic">Staff Only</h2>
            <p class="text-xs opacity-50 uppercase tracking-widest">Enter PIN</p>
            <input type="password" id="admin-pin" placeholder="••••" class="text-center bg-neutral-900 border gold-border p-4 w-full rounded outline-none text-2xl tracking-[0.5em]">
            <button id="login-btn" class="w-full bg-[#c5a059] text-black font-bold py-4 rounded hover:bg-[#d4b47a] transition-all">LOGIN</button>
        </div>
    </div>

    <!-- Konten Dashboard -->
    <div id="dashboard" class="step-hidden min-h-screen">
        <nav class="p-6 border-b gold-border flex justify-between items-center bg-black/50 sticky top-0 z-50 backdrop-blur-md">
            <div class="flex items-center space-x-2">
                <span class="text-xl font-serif gold-text italic">Estate Admin Panel</span>
            </div>
            <div class="flex items-center space-x-6 text-xs uppercase opacity-60">
                <span id="sync-indicator" class="flex items-center"><span class="w-2 h-2 bg-emerald-500 rounded-full mr-2 animate-pulse"></span> Live Update On</span>
                <button onclick="location.reload()" class="hover:text-white border border-white/20 px-3 py-1 rounded">Logout</button>
            </div>
        </nav>

        <main class="max-w-6xl mx-auto p-8 space-y-12">
            
            <!-- Management Gudang (Stok) -->
            <section class="space-y-6">
                <h3 class="text-2xl font-serif gold-text border-b gold-border pb-2 flex items-center">
                    <i data-lucide="package" class="mr-3 w-6 h-6"></i> Warehouse Management
                </h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <!-- Amber Stock -->
                    <div class="glass-card p-6 rounded-xl border gold-border space-y-4">
                        <p class="text-xs uppercase opacity-50 tracking-widest">Amber Note</p>
                        <div class="flex justify-between items-center">
                            <span id="stock-amber" class="text-3xl font-bold italic">--</span>
                            <div class="flex space-x-2">
                                <button onclick="refillStock('amber', 10)" class="bg-emerald-600 text-white p-2 rounded hover:bg-emerald-500">+</button>
                                <button onclick="refillStock('amber', -1)" class="bg-red-900/50 text-white p-2 rounded hover:bg-red-500">-</button>
                            </div>
                        </div>
                    </div>
                    <!-- Velvet Stock -->
                    <div class="glass-card p-6 rounded-xl border gold-border space-y-4">
                        <p class="text-xs uppercase opacity-50 tracking-widest">Velvet Note</p>
                        <div class="flex justify-between items-center">
                            <span id="stock-velvet" class="text-3xl font-bold italic">--</span>
                            <div class="flex space-x-2">
                                <button onclick="refillStock('velvet', 10)" class="bg-emerald-600 text-white p-2 rounded hover:bg-emerald-500">+</button>
                                <button onclick="refillStock('velvet', -1)" class="bg-red-900/50 text-white p-2 rounded hover:bg-red-500">-</button>
                            </div>
                        </div>
                    </div>
                    <!-- Midnight Stock -->
                    <div class="glass-card p-6 rounded-xl border gold-border space-y-4">
                        <p class="text-xs uppercase opacity-50 tracking-widest">Marine Note</p>
                        <div class="flex justify-between items-center">
                            <span id="stock-midnight" class="text-3xl font-bold italic">--</span>
                            <div class="flex space-x-2">
                                <button onclick="refillStock('midnight', 10)" class="bg-emerald-600 text-white p-2 rounded hover:bg-emerald-500">+</button>
                                <button onclick="refillStock('midnight', -1)" class="bg-red-900/50 text-white p-2 rounded hover:bg-red-500">-</button>
                            </div>
                        </div>
                    </div>
                </div>
            </section>

            <!-- Antrean Pesanan -->
            <section class="space-y-6">
                <h3 class="text-2xl font-serif gold-text border-b gold-border pb-2 flex items-center">
                    <i data-lucide="list-ordered" class="mr-3 w-6 h-6"></i> Ongoing Orders Queue
                </h3>
                <div id="order-queue" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="col-span-full py-20 text-center opacity-30 italic">Waiting for new orders...</div>
                </div>
            </section>

            <!-- Riwayat Penjualan -->
            <section class="space-y-6">
                <h3 class="text-2xl font-serif gold-text border-b gold-border pb-2 flex items-center opacity-50">
                    <i data-lucide="history" class="mr-3 w-6 h-6"></i> Sales History (Completed)
                </h3>
                <div class="overflow-x-auto glass-card rounded-2xl border gold-border">
                    <table class="w-full text-left text-sm">
                        <thead class="text-[10px] uppercase opacity-40 border-b border-white/5">
                            <tr>
                                <th class="p-4">Customer</th>
                                <th class="p-4">Items</th>
                                <th class="p-4">Total</th>
                                <th class="p-4">Status</th>
                                <th class="p-4 text-right">Action</th>
                            </tr>
                        </thead>
                        <tbody id="history-list"></tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getFirestore, collection, onSnapshot, updateDoc, doc, deleteDoc, increment } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';
        import { getAuth, signInAnonymously, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';

        let db, auth, appId;

        // FUNGSI LOGIN PIN
        window.handleLogin = () => {
            const pinInput = document.getElementById('admin-pin').value;
            if(pinInput === "1234") {
                document.getElementById('login-screen').classList.add('step-hidden');
                document.getElementById('dashboard').classList.remove('step-hidden');
                initAdminSystem();
            } else {
                alert("PIN Admin Salah!");
                document.getElementById('admin-pin').value = "";
            }
        };

        document.getElementById('login-btn').onclick = window.handleLogin;

        async function initAdminSystem() {
            try {
                if (typeof __firebase_config === 'undefined') return;

                const firebaseConfig = JSON.parse(__firebase_config);
                const app = initializeApp(firebaseConfig);
                db = getFirestore(app);
                auth = getAuth(app);
                appId = typeof __app_id !== 'undefined' ? __app_id : 'estate-no-4';

                onAuthStateChanged(auth, (u) => { 
                    if (!u) signInAnonymously(auth); 
                    else startSync();
                });
            } catch (e) { console.error(e); }
        }

        function startSync() {
            // 1. SINKRONISASI STOK WAREHOUSE
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'warehouse'), (snapshot) => {
                snapshot.forEach(d => {
                    const el = document.getElementById(`stock-${d.id}`);
                    if (el) el.innerText = d.data().stock;
                });
            });

            // 2. SINKRONISASI PESANAN (QUEUE & HISTORY)
            onSnapshot(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), (snapshot) => {
                const queueContainer = document.getElementById('order-queue');
                const historyList = document.getElementById('history-list');
                
                queueContainer.innerHTML = '';
                historyList.innerHTML = '';

                const allOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                
                // Pisahkan Aktif vs Selesai
                const activeOrders = allOrders.filter(o => o.status !== 'completed');
                const completedOrders = allOrders.filter(o => o.status === 'completed');

                if (activeOrders.length === 0) {
                    queueContainer.innerHTML = '<div class="col-span-full py-20 text-center opacity-30 italic font-serif">Tidak ada pesanan aktif saat ini.</div>';
                }

                activeOrders.forEach(order => {
                    const isReady = order.status === 'ready';
                    queueContainer.innerHTML += `
                        <div class="glass-card p-6 rounded-2xl border ${isReady ? 'border-emerald-500/40 bg-emerald-500/5' : 'gold-border'} flex flex-col space-y-4">
                            <div class="flex justify-between items-start">
                                <div>
                                    <h4 class="text-xl font-serif gold-text">${order.name}</h4>
                                    <p class="text-[10px] uppercase opacity-40">${order.method} | WA: ${order.phone}</p>
                                </div>
                                <span class="status-badge ${isReady ? 'status-ready' : 'status-pending'}">${order.status}</span>
                            </div>
                            <div class="text-sm italic opacity-70">
                                ${order.cart.map(i => `- ${i.name} (x1)`).join('<br>')}
                            </div>
                            ${order.method === 'preorder' ? `<div class="text-[10px] bg-white/5 p-2 rounded">Pickup: ${order.date} @ ${order.time}</div>` : ''}
                            <div class="flex space-x-2 pt-2">
                                ${!isReady ? 
                                    `<button onclick="updateStatus('${order.id}', 'ready', '${order.phone}', '${order.name}')" class="flex-1 bg-emerald-600 text-white font-bold py-3 rounded-lg text-[10px] uppercase">Mark Ready & Notify</button>` :
                                    `<button onclick="updateStatus('${order.id}', 'completed')" class="flex-1 bg-white text-black font-bold py-3 rounded-lg text-[10px] uppercase">Mark Picked Up (Complete)</button>`
                                }
                            </div>
                        </div>
                    `;
                });

                completedOrders.forEach(order => {
                    historyList.innerHTML += `
                        <tr class="border-b border-white/5">
                            <td class="p-4 font-bold">${order.name}</td>
                            <td class="p-4 italic font-serif">${order.cart.map(i => i.name).join(', ')}</td>
                            <td class="p-4 gold-text">Rp ${order.cart.reduce((a, b) => a + b.price, 0).toLocaleString()}</td>
                            <td class="p-4 opacity-50">Selesai</td>
                            <td class="p-4 text-right">
                                <button onclick="deleteRecord('${order.id}')" class="text-red-500/30 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                            </td>
                        </tr>
                    `;
                });
                lucide.createIcons();
            });
        }

        // FUNGSI UPDATE STATUS & WHATSAPP NOTIF
        window.updateStatus = async (docId, newStatus, phone = null, name = null) => {
            try {
                await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', docId), { status: newStatus });
                
                // Notifikasi WA saat pesanan READY
                if (newStatus === 'ready' && phone) {
                    const msg = `Hello ${name}! Your order from Estate No. 4 is READY to pick up. Please head to the counter. We are waiting for you! ^^`;
                    window.open(`https://wa.me/${phone}?text=${encodeURIComponent(msg)}`, '_blank');
                }
            } catch (e) { alert("Gagal update status."); }
        };

        // FUNGSI ADMIN REFILL STOK
        window.refillStock = async (key, amount) => {
            try {
                const ref = doc(db, 'artifacts', appId, 'public', 'data', 'warehouse', key);
                await updateDoc(ref, { stock: increment(amount) });
            } catch (e) { alert("Gagal update stok."); }
        };

        window.deleteRecord = async (docId) => {
            if (confirm("Hapus riwayat ini?")) await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', docId));
        };

        lucide.createIcons();
    </script>
</body>
</html>
